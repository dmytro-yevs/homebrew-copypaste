name: sync-cask

on:
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional release version (no leading v). If omitted, latest cask from main repo is mirrored.'
        required: false
        type: string
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch cask from upstream main repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p Casks
          gh api repos/dmytro-yevs/copypaste/contents/Casks/copypaste.rb \
            --jq '.content' | base64 -d > Casks/copypaste.rb
          echo "Fetched upstream cask:"
          grep -E '^\s*version|^\s*sha256' Casks/copypaste.rb | head -2

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- Casks/copypaste.rb; then
            echo "Cask unchanged — nothing to push."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Cask changed:"
            git --no-pager diff -- Casks/copypaste.rb
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          VERSION=$(awk -F'"' '/^[[:space:]]*version[[:space:]]+"/ {print $2; exit}' Casks/copypaste.rb)
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Casks/copypaste.rb
          git commit -m "chore(cask): sync to ${VERSION} from upstream"
          git push
